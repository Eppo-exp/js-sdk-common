name: Test Publish (Dry Run)
on:
  push:
    branches:
      - fix/update-publish-workflow-actions

jobs:
  test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Display Test Plan
        run: |
          echo "Running dry-run publish test on branch: ${{ github.ref_name }}"
          echo "This will NOT actually publish to npm"

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: yarn install
      - run: yarn test

      - name: Dry Run Publish
        uses: JS-DevTools/npm-publish@v4
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
          dry-run: true

      - name: Upload npm debug log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*.log
