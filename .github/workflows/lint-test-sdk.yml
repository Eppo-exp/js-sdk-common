name: Test and lint SDK
on:
  pull_request:
    paths:
      - '**/*'

jobs:
  lint-test-sdk:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        # Active LTS lines only. Node 18 is EOL (2025-04-30) and the package
        # `engines.node` is `>=20.0.0`. Node 23 was tested previously but it's
        # a non-LTS interim release and `expect@30` (jest 30 transitive) only
        # supports `^18.14 || ^20 || ^22 || >=24`, skipping 23.
        node-version: [ '20', '22', '24' ]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: 'Set up GCP SDK for downloading test data'
        uses: 'google-github-actions/setup-gcloud@v3'
      - name: Install SDK dependencies
        run: yarn --frozen-lockfile
        working-directory: ./
      - name: Check code with eslint
        run: npx eslint '**/*.{ts,tsx}'
        working-directory: ./
      - name: Run tests
        run: yarn test
        working-directory: ./
  typecheck:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        # Active LTS lines only. Node 18 is EOL (2025-04-30) and the package
        # `engines.node` is `>=20.0.0`. Node 23 was tested previously but it's
        # a non-LTS interim release and `expect@30` (jest 30 transitive) only
        # supports `^18.14 || ^20 || ^22 || >=24`, skipping 23.
        node-version: [ '20', '22', '24' ]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: Install SDK dependencies
        run: yarn --frozen-lockfile
        working-directory: ./
      - name: Run typecheck
        run: yarn typecheck
        working-directory: ./
